<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Game Hub Admin Pro</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#111;
  color:white;
}

#auth{
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box{
  background:#222;
  padding:20px;
  width:300px;
  border-radius:10px;
}

input,button,textarea{
  width:100%;
  margin:5px 0;
  padding:8px;
}

#main{
  display:none;
  flex-direction:column;
  height:100vh;
}

#topbar{
  background:black;
  padding:10px;
  display:flex;
  gap:10px;
}

.page{ display:none; padding:20px; }

#gameGrid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:10px;
}

.card{
  background:#333;
  border-radius:10px;
  overflow:hidden;
  cursor:pointer;
  text-align:center;
}

.card img{
  width:100%;
  height:100px;
  object-fit:cover;
}

iframe{
  width:100%;
  height:70vh;
  border:none;
}

/* ADMIN PANEL */
.adminBox{
  background:#1e1e1e;
  padding:10px;
  border-radius:10px;
}
.userRow{
  background:#333;
  padding:5px;
  margin:5px 0;
  display:flex;
  justify-content:space-between;
}
</style>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

</head>

<body>

<!-- LOGIN -->
<div id="auth">
  <div class="box">
    <h2>Login</h2>
    <input id="username" placeholder="Username">
    <input id="password" type="password">

    <button onclick="signup()">Sign Up</button>
    <button onclick="login()">Login</button>
  </div>
</div>

<!-- MAIN -->
<div id="main">

<div id="topbar">
  <button onclick="show('home')">Home</button>
  <button onclick="show('games')">Games</button>
  <button onclick="show('chat')">Chat</button>
  <button onclick="show('admin')">Admin</button>
  <button onclick="logout()">Logout</button>
</div>

<!-- HOME -->
<div id="home" class="page">
  <h2>Online: <span id="count">0</span></h2>
</div>

<!-- GAMES -->
<div id="games" class="page">
  <div id="gameGrid"></div>
</div>

<!-- PLAY -->
<div id="play" class="page">
  <iframe id="frame"></iframe>
</div>

<!-- CHAT -->
<div id="chat" class="page">
  <div id="chatBox" style="height:250px;overflow:auto;background:#222;padding:10px;"></div>
  <input id="msg">
  <button onclick="sendMsg()">Send</button>
</div>

<!-- ADMIN -->
<div id="admin" class="page">
  <div class="adminBox">

  <h2>ADMIN PANEL</h2>

  <h3>Users</h3>
  <div id="userList"></div>

  <hr>

  <h3>Upload Game</h3>
  <input id="gameName" placeholder="Game Name">
  <input id="gameFile" type="file">
  <input id="thumbFile" type="file">
  <button onclick="uploadGame()">Upload</button>

  </div>
</div>

</div>

<script>
// FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyCa_6ibc9IYW2U_4NRaPUuwsQ9INOgzSlM",
  authDomain: "hubby-c5ff6.firebaseapp.com",
  projectId: "hubby-c5ff6",
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();
const rtdb = firebase.database();

let currentUser="";

/* LOGIN */
function makeEmail(u){
  return u.trim().toLowerCase()+"@gamehub.com";
}

function signup(){
  auth.createUserWithEmailAndPassword(makeEmail(username.value),password.value);
}

function login(){
  auth.signInWithEmailAndPassword(makeEmail(username.value),password.value);
}

function logout(){auth.signOut();}

/* AUTH */
auth.onAuthStateChanged(async user=>{
  if(!user) return;

  currentUser=user.email.split("@")[0].toLowerCase();

  document.getElementById("auth").style.display="none";
  document.getElementById("main").style.display="flex";

  setOnline();
  loadGames();
  loadChat();
  loadUsers();
  trackOnline();

  show("home");
});

/* NAV */
function show(p){
  document.querySelectorAll(".page").forEach(x=>x.style.display="none");
  document.getElementById(p).style.display="block";
}

/* ================= ADMIN SYSTEM ================= */

/* ROLE CHECK */
async function getRole(user){
  let doc = await db.collection("users").doc(user).get();
  return doc.exists ? doc.data().role : "user";
}

/* BAN USER */
async function banUser(user){
  await db.collection("users").doc(user).set({
    banned:true
  },{merge:true});
}

/* KICK USER (disconnect) */
function kickUser(user){
  rtdb.ref("online/"+user).remove();
}

/* DELETE USER */
function deleteUser(user){
  db.collection("users").doc(user).delete();
}

/* LOAD USERS LIVE */
function loadUsers(){
  db.collection("users").onSnapshot(snap=>{
    userList.innerHTML="";

    snap.forEach(doc=>{
      let u = doc.id;
      let data = doc.data();

      let div=document.createElement("div");
      div.className="userRow";

      div.innerHTML=`
        <span>${u} ${data.banned ? "(BANNED)" : ""}</span>
        <div>
          <button onclick="kickUser('${u}')">Kick</button>
          <button onclick="banUser('${u}')">Ban</button>
          <button onclick="deleteUser('${u}')">Delete</button>
        </div>
      `;

      userList.appendChild(div);
    });
  });
}

/* ================= GAMES ================= */

function uploadGame(){
  let g=gameFile.files[0];
  let t=thumbFile.files[0];

  let rg=new FileReader();
  let rt=new FileReader();

  rg.onload=e=>{
    rt.onload=tt=>{
      db.collection("games").add({
        name:gameName.value || g.name,
        html:e.target.result,
        thumb:tt.target.result || ""
      });
    };

    if(t) rt.readAsDataURL(t);
    else rt.onload({target:{result:""}});
  };

  rg.readAsText(g);
}

function loadGames(){
  db.collection("games").onSnapshot(snap=>{
    gameGrid.innerHTML="";

    snap.forEach(doc=>{
      let g=doc.data();

      let card=document.createElement("div");
      card.className="card";

      card.innerHTML=`
        <img src="${g.thumb}">
        <div>${g.name}</div>
      `;

      card.onclick=()=>{
        show("play");
        let blob=new Blob([g.html],{type:"text/html"});
        frame.src=URL.createObjectURL(blob);
      };

      gameGrid.appendChild(card);
    });
  });
}

/* ================= CHAT ================= */
function sendMsg(){
  db.collection("chat").add({
    user:currentUser,
    msg:msg.value,
    time:Date.now()
  });
  msg.value="";
}

function loadChat(){
  db.collection("chat").orderBy("time")
  .onSnapshot(snap=>{
    chatBox.innerHTML="";
    snap.forEach(d=>{
      let c=d.data();
      chatBox.innerHTML+=c.user+": "+c.msg+"<br>";
    });
  });
}

/* ================= ONLINE ================= */
function setOnline(){
  rtdb.ref("online/"+currentUser).set(true);
  rtdb.ref("online/"+currentUser).onDisconnect().remove();
}

function trackOnline(){
  rtdb.ref("online").on("value",snap=>{
    let d=snap.val()||{};
    count.innerText=Object.keys(d).length;
  });
}
</script>

</body>
</html>
