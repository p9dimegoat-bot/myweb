<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Game Hub Editor System</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#111;
  color:white;
}

#auth{
  display:flex;
  height:100vh;
  justify-content:center;
  align-items:center;
}

.box{
  background:#222;
  padding:20px;
  width:300px;
  border-radius:10px;
}

input,button,textarea{
  width:100%;
  margin:5px 0;
  padding:8px;
}

#main{
  display:none;
  flex-direction:column;
  height:100vh;
}

#topbar{
  background:black;
  padding:10px;
  display:flex;
  gap:10px;
}

.page{ display:none; padding:20px; }

#gameGrid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:10px;
}

.card{
  background:#333;
  border-radius:10px;
  overflow:hidden;
  cursor:pointer;
  text-align:center;
  position:relative;
}

.card img{
  width:100%;
  height:100px;
  object-fit:cover;
}

/* EDIT BUTTON */
.editBtn{
  position:absolute;
  top:5px;
  right:5px;
  background:yellow;
  color:black;
  border:none;
  cursor:pointer;
  font-size:12px;
}

/* EDIT MODAL */
#editBox{
  display:none;
  position:fixed;
  top:20%;
  left:50%;
  transform:translateX(-50%);
  background:#222;
  padding:15px;
  width:300px;
  border-radius:10px;
}
</style>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

</head>

<body>

<!-- LOGIN -->
<div id="auth">
  <div class="box">
    <h2>Login</h2>
    <input id="username" placeholder="Username">
    <input id="password" type="password">
    <button onclick="signup()">Sign Up</button>
    <button onclick="login()">Login</button>
  </div>
</div>

<!-- MAIN -->
<div id="main">

<div id="topbar">
  <button onclick="show('games')">Games</button>
</div>

<div id="games" class="page">
  <div id="gameGrid"></div>
</div>

<div id="play" class="page">
  <button onclick="frame.requestFullscreen()">Fullscreen</button>
  <iframe id="frame"></iframe>
</div>

</div>

<!-- EDIT PANEL -->
<div id="editBox">
  <h3>Edit Game</h3>

  <input id="editName" placeholder="New Name">
  <input id="editThumb" type="file">

  <button onclick="saveEdit()">Save</button>
  <button onclick="deleteGame()">Delete</button>
  <button onclick="closeEdit()">Cancel</button>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCa_6ibc9IYW2U_4NRaPUuwsQ9INOgzSlM",
  authDomain: "hubby-c5ff6.firebaseapp.com",
  projectId: "hubby-c5ff6",
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();
const rtdb = firebase.database();

let currentUser="";
let editingId="";
let editingData={};

/* LOGIN */
function makeEmail(u){
  return u.trim().toLowerCase()+"@gamehub.com";
}

function signup(){
  auth.createUserWithEmailAndPassword(makeEmail(username.value),password.value);
}

function login(){
  auth.signInWithEmailAndPassword(makeEmail(username.value),password.value);
}

/* AUTH */
auth.onAuthStateChanged(user=>{
  if(!user)return;

  currentUser=user.email.split("@")[0].toLowerCase();

  document.getElementById("auth").style.display="none";
  document.getElementById("main").style.display="flex";

  loadGames();
});

/* NAV */
function show(p){
  document.querySelectorAll(".page").forEach(x=>x.style.display="none");
  document.getElementById(p).style.display="block";
}

/* ================= GAMES ================= */
function loadGames(){
  db.collection("games").onSnapshot(snap=>{
    gameGrid.innerHTML="";

    snap.forEach(doc=>{
      let g=doc.data();

      let card=document.createElement("div");
      card.className="card";

      card.innerHTML=`
        <img src="${g.thumb}">
        <div>${g.name}</div>
      `;

      card.onclick=()=>{
        show("play");
        frame.src=URL.createObjectURL(new Blob([g.html],{type:"text/html"}));
      };

      // OWNER EDIT BUTTON
      if(currentUser==="owner"){
        let btn=document.createElement("button");
        btn.className="editBtn";
        btn.innerText="Edit";

        btn.onclick=(e)=>{
          e.stopPropagation();
          openEdit(doc.id,g);
        };

        card.appendChild(btn);
      }

      gameGrid.appendChild(card);
    });
  });
}

/* ================= EDIT SYSTEM ================= */
function openEdit(id,data){
  editingId=id;
  editingData=data;

  editName.value=data.name;

  editBox.style.display="block";
}

function closeEdit(){
  editBox.style.display="none";
}

/* SAVE EDIT */
function saveEdit(){
  let file = editThumb.files[0];

  if(file){
    let reader=new FileReader();

    reader.onload=e=>{
      db.collection("games").doc(editingId).update({
        name:editName.value,
        thumb:e.target.result
      });
    };

    reader.readAsDataURL(file);
  } else {
    db.collection("games").doc(editingId).update({
      name:editName.value
    });
  }

  closeEdit();
}

/* DELETE GAME */
function deleteGame(){
  db.collection("games").doc(editingId).delete();
  closeEdit();
}
</script>

</body>
</html>
