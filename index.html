<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Game Hub Stable Upgrade</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#111;
  color:white;
}

#auth{
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box{
  background:#222;
  padding:20px;
  width:300px;
  border-radius:10px;
}

input,button,textarea{
  width:100%;
  margin:5px 0;
  padding:8px;
}

#main{
  display:none;
  flex-direction:column;
  height:100vh;
}

/* TOP BAR */
#topbar{
  background:black;
  padding:10px;
  display:flex;
  gap:10px;
}

/* GLOBAL ANNOUNCEMENT */
#annBar{
  background:red;
  text-align:center;
  padding:8px;
  font-weight:bold;
}

/* PAGES */
.page{ display:none; padding:20px; }

/* GAME GRID */
#gameGrid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:10px;
}

.card{
  background:#333;
  border-radius:10px;
  overflow:hidden;
  cursor:pointer;
  text-align:center;
}

.card img{
  width:100%;
  height:100px;
  object-fit:cover;
}

/* GAME VIEW */
iframe{
  width:100%;
  height:70vh;
  border:none;
}

/* FULLSCREEN BUTTON (KEPT) */
#fsBtn{
  position:absolute;
  right:20px;
  top:80px;
  background:#444;
}
</style>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

</head>

<body>

<!-- AUTH -->
<div id="auth">
  <div class="box">
    <h2>Login</h2>
    <input id="username" placeholder="Username">
    <input id="password" type="password">

    <button onclick="signup()">Sign Up</button>
    <button onclick="login()">Login</button>
  </div>
</div>

<!-- MAIN -->
<div id="main">

<!-- GLOBAL ANNOUNCEMENT -->
<div id="annBar">Loading announcement...</div>

<div id="topbar">
  <button onclick="show('home')">Home</button>
  <button onclick="show('games')">Games</button>
  <button onclick="show('chat')">Chat</button>
  <button onclick="show('admin')">Admin</button>
  <button onclick="logout()">Logout</button>
</div>

<!-- HOME -->
<div id="home" class="page">
  <h2>Online: <span id="count">0</span></h2>
</div>

<!-- GAMES -->
<div id="games" class="page">
  <div id="gameGrid"></div>
</div>

<!-- PLAY -->
<div id="play" class="page">
  <button onclick="fullscreen()">Fullscreen</button>
  <iframe id="frame"></iframe>
</div>

<!-- ADMIN -->
<div id="admin" class="page">
  <h2>ADMIN PANEL</h2>

  <!-- GAME NAME -->
  <input id="gameName" placeholder="Game Name">

  <!-- GAME FILE -->
  <input id="gameFile" type="file">

  <!-- THUMBNAIL -->
  <input id="thumbFile" type="file">

  <button onclick="uploadGame()">Upload Game</button>

  <hr>

  <!-- GLOBAL ANNOUNCEMENT -->
  <textarea id="ann"></textarea>
  <button onclick="setAnn()">Set Announcement</button>
</div>

</div>

<script>
// FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyCa_6ibc9IYW2U_4NRaPUuwsQ9INOgzSlM",
  authDomain: "hubby-c5ff6.firebaseapp.com",
  projectId: "hubby-c5ff6",
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();
const rtdb = firebase.database();

let currentUser="";

/* LOGIN */
function makeEmail(u){
  return u.trim().toLowerCase()+"@gamehub.com";
}

function signup(){
  auth.createUserWithEmailAndPassword(makeEmail(username.value),password.value);
}

function login(){
  auth.signInWithEmailAndPassword(makeEmail(username.value),password.value);
}

function logout(){auth.signOut();}

/* AUTH */
auth.onAuthStateChanged(user=>{
  if(!user)return;

  currentUser=user.email.split("@")[0].toLowerCase();

  document.getElementById("auth").style.display="none";
  document.getElementById("main").style.display="flex";

  setOnline();
  loadGames();
  loadAnnouncement();
  trackOnline();

  show("home");
});

/* NAV */
function show(p){
  document.querySelectorAll(".page").forEach(x=>x.style.display="none");
  document.getElementById(p).style.display="block";

  if(p!=="play"){
    frame.src="";
  }
}

/* ================= FULLSCREEN (KEPT EXACT) ================= */
function fullscreen(){
  const frame=document.getElementById("frame");
  if(frame && frame.requestFullscreen){
    frame.requestFullscreen();
  }
}

/* ================= GAME UPLOAD (NAME + THUMBNAIL ADDED) ================= */
function uploadGame(){
  let name = gameName.value;
  let g = gameFile.files[0];
  let t = thumbFile.files[0];

  let rg=new FileReader();
  let rt=new FileReader();

  rg.onload=e=>{
    rt.onload=tt=>{
      db.collection("games").add({
        name: name || g.name,
        html:e.target.result,
        thumb:tt.target.result || ""
      });
    };

    if(t) rt.readAsDataURL(t);
    else rt.onload({target:{result:""}});
  };

  rg.readAsText(g);
}

/* LOAD GAMES */
function loadGames(){
  db.collection("games").onSnapshot(snap=>{
    gameGrid.innerHTML="";

    snap.forEach(doc=>{
      let g=doc.data();

      let card=document.createElement("div");
      card.className="card";

      card.innerHTML=`
        <img src="${g.thumb || 'https://via.placeholder.com/150'}">
        <div>${g.name}</div>
      `;

      card.onclick=()=>{
        show("play");
        let blob=new Blob([g.html],{type:"text/html"});
        frame.src=URL.createObjectURL(blob);
      };

      gameGrid.appendChild(card);
    });
  });
}

/* ================= GLOBAL ANNOUNCEMENT ================= */
function setAnn(){
  db.collection("global").doc("announcement").set({
    text:ann.value
  });
}

function loadAnnouncement(){
  db.collection("global").doc("announcement")
  .onSnapshot(doc=>{
    annBar.innerText = doc.exists ? doc.data().text : "No announcement";
  });
}

/* ================= ONLINE ================= */
function setOnline(){
  rtdb.ref("online/"+currentUser).set(true);
  rtdb.ref("online/"+currentUser).onDisconnect().remove();
}

function trackOnline(){
  rtdb.ref("online").on("value",snap=>{
    let d=snap.val()||{};
    count.innerText=Object.keys(d).length;
  });
}
</script>

</body>
</html>
