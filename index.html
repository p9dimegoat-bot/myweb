<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Game Hub</title>

<style>
body { margin:0; font-family:Arial; background:#111; color:white; }

#auth { display:flex; justify-content:center; align-items:center; height:100vh; }
.box { background:#222; padding:20px; width:300px; border-radius:10px; }

input, button, textarea { width:100%; margin:5px 0; padding:8px; }

#main { display:none; flex-direction:column; height:100vh; }

#topbar { background:black; padding:10px; }
.page { display:none; padding:20px; }

.game { background:#333; padding:10px; margin:5px; cursor:pointer; }

iframe { width:100%; height:70vh; border:none; }

#announcement { background:red; padding:10px; text-align:center; }
</style>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

</head>

<body>

<!-- AUTH -->
<div id="auth">
  <div class="box">
    <h2>Sign Up / Login</h2>
    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">

    <button onclick="signup()">Sign Up</button>
    <button onclick="login()">Login</button>
  </div>
</div>

<!-- MAIN -->
<div id="main">

<div id="announcement">Loading...</div>

<div id="topbar">
  <button onclick="show('home')">Home</button>
  <button onclick="show('games')">Games</button>
  <button onclick="show('admin')">Admin</button>
  <button onclick="logout()">Logout</button>
</div>

<div id="home" class="page"><h2>Welcome</h2></div>

<div id="games" class="page">
  <h2>Games</h2>
  <div id="gameList"></div>
</div>

<div id="play" class="page">
  <iframe id="frame"></iframe>
</div>

<div id="admin" class="page">
  <h2>Admin</h2>

  <textarea id="ann"></textarea>
  <button onclick="setAnn()">Set Announcement</button>

  <input type="file" id="file">
  <button onclick="uploadGame()">Upload Game</button>
</div>

</div>

<script>
// FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyCa_6ibc9IYW2U_4NRaPUuwsQ9INOgzSlM",
  authDomain: "hubby-c5ff6.firebaseapp.com",
  projectId: "hubby-c5ff6",
  storageBucket: "hubby-c5ff6.firebasestorage.app",
  messagingSenderId: "1062150257550",
  appId: "1:1062150257550:web:3d3adfc1276233086ac2df",
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

/* TURN USERNAME INTO EMAIL */
function makeEmail(username){
  return username + "@gamehub.com";
}

/* SIGN UP */
function signup(){
  let user = document.getElementById("username").value;
  let pass = document.getElementById("password").value;

  auth.createUserWithEmailAndPassword(makeEmail(user), pass)
  .then(()=> alert("Account created"))
  .catch(e=>alert(e.message));
}

/* LOGIN */
function login(){
  let user = document.getElementById("username").value;
  let pass = document.getElementById("password").value;

  auth.signInWithEmailAndPassword(makeEmail(user), pass)
  .catch(e=>alert(e.message));
}

/* LOGOUT */
function logout(){
  auth.signOut();
}

/* AUTO LOGIN */
auth.onAuthStateChanged(user=>{
  if(user){
    document.getElementById("auth").style.display="none";
    document.getElementById("main").style.display="flex";

    loadAnnouncement();
    loadGames();
    show("home");
  } else {
    document.getElementById("auth").style.display="flex";
    document.getElementById("main").style.display="none";
  }
});

/* NAV */
function show(p){
  document.querySelectorAll(".page").forEach(x=>x.style.display="none");
  document.getElementById(p).style.display="block";
}

/* ANNOUNCEMENTS */
function setAnn(){
  db.collection("global").doc("announcement").set({
    text: document.getElementById("ann").value
  });
}

function loadAnnouncement(){
  db.collection("global").doc("announcement")
  .onSnapshot(doc=>{
    document.getElementById("announcement").innerText =
      doc.exists ? doc.data().text : "No announcements";
  });
}

/* GAMES */
function uploadGame(){
  let file = document.getElementById("file").files[0];

  let reader = new FileReader();

  reader.onload = function(e){
    db.collection("games").add({
      name: file.name,
      html: e.target.result
    });
  };

  reader.readAsText(file);
}

function loadGames(){
  db.collection("games").onSnapshot(snap=>{
    let list = document.getElementById("gameList");
    list.innerHTML = "";

    snap.forEach(doc=>{
      let g = doc.data();

      let div = document.createElement("div");
      div.className="game";
      div.innerText=g.name;

      div.onclick=()=>{
        show("play");
        let blob=new Blob([g.html],{type:"text/html"});
        document.getElementById("frame").src=URL.createObjectURL(blob);
      };

      list.appendChild(div);
    });
  });
}
</script>

</body>
</html>
