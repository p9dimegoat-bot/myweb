<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Stable Game Hub Core</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#111;
  color:white;
}

#auth{
  display:flex;
  height:100vh;
  justify-content:center;
  align-items:center;
}

.box{
  background:#222;
  padding:20px;
  width:300px;
  border-radius:10px;
}

input,button,textarea{
  width:100%;
  margin:5px 0;
  padding:8px;
}

#main{
  display:none;
  flex-direction:column;
  height:100vh;
}

#topbar{
  background:black;
  padding:10px;
  display:flex;
  gap:10px;
}

.page{ display:none; padding:20px; }

#gameGrid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:10px;
}

.card{
  background:#333;
  border-radius:10px;
  overflow:hidden;
  cursor:pointer;
  text-align:center;
}

.card img{
  width:100%;
  height:100px;
  object-fit:cover;
}

iframe{
  width:100%;
  height:70vh;
  border:none;
}

#annBar{
  background:red;
  padding:6px;
  text-align:center;
}
</style>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

</head>

<body>

<!-- LOGIN -->
<div id="auth">
  <div class="box">
    <h2>Login</h2>
    <input id="username" placeholder="Username">
    <input id="password" type="password">
    <button onclick="signup()">Sign Up</button>
    <button onclick="login()">Login</button>
  </div>
</div>

<!-- APP -->
<div id="main">

<div id="annBar">Loading...</div>

<div id="topbar">
  <button onclick="show('home')">Home</button>
  <button onclick="show('games')">Games</button>
  <button onclick="show('chat')">Chat</button>
  <button onclick="show('admin')">Admin</button>
</div>

<!-- HOME -->
<div id="home" class="page">
  <h2>Online: <span id="count">0</span></h2>
</div>

<!-- GAMES -->
<div id="games" class="page">
  <div id="gameGrid"></div>
</div>

<!-- PLAY -->
<div id="play" class="page">
  <button onclick="fullscreen()">Fullscreen</button>
  <iframe id="frame"></iframe>
</div>

<!-- CHAT -->
<div id="chat" class="page">
  <div id="chatBox" style="height:250px;overflow:auto;background:#222;padding:10px;"></div>
  <input id="msg">
  <button onclick="sendMsg()">Send</button>
</div>

<!-- ADMIN (MODULE SAFE) -->
<div id="admin" class="page">
  <h2>Admin Panel</h2>

  <input id="gameName" placeholder="Game Name">
  <input id="gameFile" type="file">
  <input id="thumbFile" type="file">
  <button onclick="uploadGame()">Upload Game</button>

  <hr>

  <textarea id="ann"></textarea>
  <button onclick="setAnn()">Set Announcement</button>

  <hr>

  <h3>Games Manager</h3>
  <div id="adminGames"></div>
</div>

</div>

<script>
/* ================= FIREBASE ================= */
const firebaseConfig = {
  apiKey: "AIzaSyCa_6ibc9IYW2U_4NRaPUuwsQ9INOgzSlM",
  authDomain: "hubby-c5ff6.firebaseapp.com",
  projectId: "hubby-c5ff6",
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();
const rtdb = firebase.database();

/* ================= CORE STATE ================= */
let currentUser="";
const ROLE = {
  OWNER:"owner",
  ADMIN:"admin",
  USER:"user"
};

/* ================= AUTH ================= */
function makeEmail(u){
  return u.trim().toLowerCase()+"@gamehub.com";
}

function signup(){
  auth.createUserWithEmailAndPassword(makeEmail(username.value),password.value);
}

function login(){
  auth.signInWithEmailAndPassword(makeEmail(username.value),password.value);
}

/* ================= USER SYSTEM (STABLE CORE) ================= */
async function getUserData(){
  let ref = db.collection("users").doc(currentUser);
  let doc = await ref.get();

  if(!doc.exists){
    await ref.set({
      role: ROLE.USER,
      banned:false
    });
    return {role:ROLE.USER,banned:false};
  }

  return doc.data();
}

/* ================= INIT ================= */
auth.onAuthStateChanged(async user=>{
  if(!user)return;

  currentUser = user.email.split("@")[0].toLowerCase();

  let data = await getUserData();

  if(data.banned){
    alert("You are banned");
    auth.signOut();
    return;
  }

  document.getElementById("auth").style.display="none";
  document.getElementById("main").style.display="flex";

  setOnline();
  loadGames();
  loadAnnouncement();
  loadAdminPanel();

  show("home");
});

/* ================= NAV ================= */
function show(p){
  document.querySelectorAll(".page").forEach(x=>x.style.display="none");
  document.getElementById(p).style.display="block";
}

/* ================= FULLSCREEN (SAFE, NEVER REMOVED) ================= */
function fullscreen(){
  frame.requestFullscreen();
}

/* ================= GAMES ================= */
function uploadGame(){
  let name = gameName.value;
  let g = gameFile.files[0];
  let t = thumbFile.files[0];

  let rg=new FileReader();
  let rt=new FileReader();

  rg.onload=e=>{
    rt.onload=tt=>{
      db.collection("games").add({
        name:name || g.name,
        html:e.target.result,
        thumb:tt.target.result || ""
      });
    };

    if(t) rt.readAsDataURL(t);
    else rt.onload({target:{result:""}});
  };

  rg.readAsText(g);
}

function loadGames(){
  db.collection("games").onSnapshot(snap=>{
    gameGrid.innerHTML="";

    snap.forEach(doc=>{
      let g=doc.data();

      let card=document.createElement("div");
      card.className="card";

      card.innerHTML=`
        <img src="${g.thumb}">
        <div>${g.name}</div>
      `;

      card.onclick=()=>{
        show("play");
        let blob=new Blob([g.html],{type:"text/html"});
        frame.src=URL.createObjectURL(blob);
      };

      gameGrid.appendChild(card);
    });
  });
}

/* ================= ANNOUNCEMENT ================= */
function setAnn(){
  db.collection("global").doc("announcement").set({
    text:ann.value
  });
}

function loadAnnouncement(){
  db.collection("global").doc("announcement")
  .onSnapshot(doc=>{
    annBar.innerText = doc.exists ? doc.data().text : "No announcements";
  });
}

/* ================= ADMIN MODULE (SAFE EXTENSION) ================= */
async function loadAdminPanel(){
  let data = await getUserData();

  if(data.role !== ROLE.OWNER && data.role !== ROLE.ADMIN){
    return;
  }

  db.collection("games").onSnapshot(snap=>{
    adminGames.innerHTML="";

    snap.forEach(doc=>{
      let g=doc.data();

      let div=document.createElement("div");
      div.style.background="#333";
      div.style.margin="5px";
      div.style.padding="5px";

      div.innerHTML=`
        <img src="${g.thumb}" width="60">
        ${g.name}
        <button onclick="deleteGame('${doc.id}')">Delete</button>
      `;

      adminGames.appendChild(div);
    });
  });
}

/* DELETE GAME */
function deleteGame(id){
  db.collection("games").doc(id).delete();
}

/* ================= ONLINE ================= */
function setOnline(){
  rtdb.ref("online/"+currentUser).set(true);
  rtdb.ref("online/"+currentUser).onDisconnect().remove();
}
</script>

</body>
</html>
