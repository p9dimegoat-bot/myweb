<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Game Hub</title>

<style>
body { margin:0; font-family:Arial; background:#111; color:white; }
#login { display:flex; justify-content:center; align-items:center; height:100vh; }
.box { background:#222; padding:20px; width:300px; border-radius:10px; }

input, button, textarea { width:100%; margin:5px 0; padding:8px; }

#main { display:none; flex-direction:column; height:100vh; }

#topbar { background:black; padding:10px; }
#topbar button { margin-right:10px; }

.page { display:none; padding:20px; }

.game { background:#333; padding:10px; margin:5px; cursor:pointer; border-radius:5px; }

iframe { width:100%; height:70vh; border:none; }

#announcement { background:red; padding:10px; text-align:center; }
</style>

<!-- Firebase (COMPAT VERSION = IMPORTANT) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div class="box">
    <h2>Login</h2>
    <input id="user" placeholder="Username">
    <input id="pass" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>
</div>

<!-- MAIN -->
<div id="main">

<div id="announcement">Loading...</div>

<div id="topbar">
  <button onclick="show('home')">Home</button>
  <button onclick="show('games')">Games</button>
  <button onclick="show('admin')">Admin</button>
</div>

<div id="home" class="page">
  <h2>Welcome</h2>
</div>

<div id="games" class="page">
  <h2>Games</h2>
  <div id="gameList"></div>
</div>

<div id="play" class="page">
  <iframe id="frame"></iframe>
</div>

<div id="admin" class="page">
  <h2>Admin Panel</h2>

  <h3>Global Announcement</h3>
  <textarea id="ann" placeholder="Type announcement..."></textarea>
  <button onclick="setAnn()">Set Announcement</button>

  <h3>Upload Game</h3>
  <input type="file" id="file">
  <button onclick="uploadGame()">Upload Game</button>
</div>

</div>

<script>
// 🔥 YOUR FIREBASE CONFIG (ADDED)
const firebaseConfig = {
  apiKey: "AIzaSyCa_6ibc9IYW2U_4NRaPUuwsQ9INOgzSlM",
  authDomain: "hubby-c5ff6.firebaseapp.com",
  projectId: "hubby-c5ff6",
  storageBucket: "hubby-c5ff6.firebasestorage.app",
  messagingSenderId: "1062150257550",
  appId: "1:1062150257550:web:3d3adfc1276233086ac2df",
  measurementId: "G-B79CH0DP6T"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let currentUser = "";

/* LOGIN */
function login(){
  currentUser = document.getElementById("user").value;

  if(!currentUser){
    alert("Enter username");
    return;
  }

  document.getElementById("login").style.display="none";
  document.getElementById("main").style.display="flex";

  loadAnnouncement();
  loadGames();
  show("home");
}

/* NAV */
function show(p){
  document.querySelectorAll(".page").forEach(x=>x.style.display="none");
  document.getElementById(p).style.display="block";
}

/* ANNOUNCEMENTS (GLOBAL 🔥) */
function setAnn(){
  let text = document.getElementById("ann").value;

  db.collection("global").doc("announcement").set({
    text: text
  });
}

function loadAnnouncement(){
  db.collection("global").doc("announcement")
  .onSnapshot(doc=>{
    document.getElementById("announcement").innerText =
      doc.exists ? doc.data().text : "No announcements";
  });
}

/* GAMES (GLOBAL 🔥) */
function uploadGame(){
  let file = document.getElementById("file").files[0];

  if(!file){
    alert("Pick a file");
    return;
  }

  let reader = new FileReader();

  reader.onload = function(e){
    db.collection("games").add({
      name: file.name,
      html: e.target.result
    });
  };

  reader.readAsText(file);
}

function loadGames(){
  db.collection("games").onSnapshot(snap=>{
    let list = document.getElementById("gameList");
    list.innerHTML = "";

    snap.forEach(doc=>{
      let g = doc.data();

      let div = document.createElement("div");
      div.className="game";
      div.innerText=g.name;

      div.onclick=()=>{
        show("play");

        let blob=new Blob([g.html],{type:"text/html"});
        document.getElementById("frame").src=URL.createObjectURL(blob);
      };

      list.appendChild(div);
    });
  });
}
</script>

</body>
</html>
