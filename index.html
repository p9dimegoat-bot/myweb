<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Clean Admin Reset Hub</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#111;
  color:white;
}

#auth{
  display:flex;
  height:100vh;
  justify-content:center;
  align-items:center;
}

.box{
  background:#222;
  padding:20px;
  width:300px;
  border-radius:10px;
}

input,button,textarea{
  width:100%;
  margin:5px 0;
  padding:8px;
}

#main{
  display:none;
  flex-direction:column;
  height:100vh;
}

#topbar{
  background:black;
  padding:10px;
  display:flex;
  gap:10px;
}

.page{ display:none; padding:20px; }

#gameGrid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:10px;
}

.card{
  background:#333;
  border-radius:10px;
  overflow:hidden;
  cursor:pointer;
  text-align:center;
}

.card img{
  width:100%;
  height:100px;
  object-fit:cover;
}

iframe{
  width:100%;
  height:70vh;
  border:none;
}

#annBar{
  background:red;
  text-align:center;
  padding:6px;
}

.adminSection{
  background:#222;
  padding:10px;
  margin-bottom:10px;
  border-radius:10px;
}

.userRow{
  display:flex;
  justify-content:space-between;
  background:#333;
  margin:5px 0;
  padding:5px;
}
</style>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

</head>

<body>

<!-- LOGIN -->
<div id="auth">
  <div class="box">
    <h2>Login</h2>
    <input id="username" placeholder="Username">
    <input id="password" type="password">
    <button onclick="signup()">Sign Up</button>
    <button onclick="login()">Login</button>
  </div>
</div>

<!-- APP -->
<div id="main">

<div id="annBar">Loading...</div>

<div id="topbar">
  <button onclick="show('home')">Home</button>
  <button onclick="show('games')">Games</button>
  <button onclick="show('chat')">Chat</button>
  <button onclick="show('admin')">Admin</button>
</div>

<!-- HOME -->
<div id="home" class="page">
  <h2>Online: <span id="count">0</span></h2>
</div>

<!-- GAMES -->
<div id="games" class="page">
  <div id="gameGrid"></div>
</div>

<!-- PLAY -->
<div id="play" class="page">
  <button onclick="frame.requestFullscreen()">Fullscreen</button>
  <iframe id="frame"></iframe>
</div>

<!-- ADMIN -->
<div id="admin" class="page">

  <!-- GAME UPLOAD -->
  <div class="adminSection">
    <h3>Upload Game</h3>

    <input id="gameName" placeholder="Game Name">
    <input id="gameFile" type="file">
    <input id="thumbFile" type="file">

    <button onclick="uploadGame()">Post Game</button>
  </div>

  <!-- USERS -->
  <div class="adminSection">
    <h3>Users (Kick / Ban)</h3>
    <div id="userList"></div>
  </div>

  <!-- ANNOUNCEMENT -->
  <div class="adminSection">
    <h3>Global Announcement</h3>
    <textarea id="ann"></textarea>
    <button onclick="setAnn()">Post Announcement</button>
  </div>

</div>

</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCa_6ibc9IYW2U_4NRaPUuwsQ9INOgzSlM",
  authDomain: "hubby-c5ff6.firebaseapp.com",
  projectId: "hubby-c5ff6",
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();
const rtdb = firebase.database();

let currentUser="";

/* LOGIN */
function makeEmail(u){
  return u.trim().toLowerCase()+"@gamehub.com";
}

function signup(){
  auth.createUserWithEmailAndPassword(makeEmail(username.value),password.value);
}

function login(){
  auth.signInWithEmailAndPassword(makeEmail(username.value),password.value);
}

/* GET USER ROLE */
async function getRole(){
  let doc = await db.collection("users").doc(currentUser).get();
  return doc.exists ? doc.data().role : "user";
}

/* AUTH */
auth.onAuthStateChanged(async user=>{
  if(!user)return;

  currentUser=user.email.split("@")[0].toLowerCase();

  let role = await getRole();

  if(role==="banned"){
    alert("Banned");
    auth.signOut();
    return;
  }

  document.getElementById("auth").style.display="none";
  document.getElementById("main").style.display="flex";

  if(role!=="owner"){
    document.querySelector("button[onclick=\"show('admin')\"]").style.display="none";
  }

  loadGames();
  loadUsers();
  loadAnnouncement();
  setOnline();

  show("home");
});

/* NAV */
function show(p){
  document.querySelectorAll(".page").forEach(x=>x.style.display="none");
  document.getElementById(p).style.display="block";
}

/* ================= ADMIN: GAMES ================= */
function uploadGame(){
  let name = gameName.value;
  let g = gameFile.files[0];
  let t = thumbFile.files[0];

  let rg=new FileReader();
  let rt=new FileReader();

  rg.onload=e=>{
    rt.onload=tt=>{
      db.collection("games").add({
        name:name || g.name,
        html:e.target.result,
        thumb:tt.target.result || ""
      });
    };

    if(t) rt.readAsDataURL(t);
    else rt.onload({target:{result:""}});
  };

  rg.readAsText(g);
}

/* LOAD GAMES */
function loadGames(){
  db.collection("games").onSnapshot(snap=>{
    gameGrid.innerHTML="";

    snap.forEach(doc=>{
      let g=doc.data();

      let div=document.createElement("div");
      div.className="card";

      div.innerHTML=`
        <img src="${g.thumb}">
        <div>${g.name}</div>
      `;

      div.onclick=()=>{
        show("play");
        frame.src=URL.createObjectURL(new Blob([g.html],{type:"text/html"}));
      };

      gameGrid.appendChild(div);
    });
  });
}

/* ================= USERS ================= */
function loadUsers(){
  db.collection("users").onSnapshot(snap=>{
    userList.innerHTML="";

    snap.forEach(doc=>{
      let u=doc.id;

      let row=document.createElement("div");
      row.className="userRow";

      row.innerHTML=`
        <span>${u}</span>
        <div>
          <button onclick="kick('${u}')">Kick</button>
          <button onclick="ban('${u}')">Ban</button>
        </div>
      `;

      userList.appendChild(row);
    });
  });
}

/* KICK */
function kick(u){
  rtdb.ref("online/"+u).remove();
}

/* BAN */
function ban(u){
  db.collection("users").doc(u).set({
    role:"banned"
  },{merge:true});
}

/* ================= ANNOUNCEMENT ================= */
function setAnn(){
  db.collection("global").doc("announcement").set({
    text:ann.value
  });
}

function loadAnnouncement(){
  db.collection("global").doc("announcement")
  .onSnapshot(doc=>{
    annBar.innerText = doc.exists ? doc.data().text : "No announcement";
  });
}

/* ================= ONLINE ================= */
function setOnline(){
  rtdb.ref("online/"+currentUser).set(true);
  rtdb.ref("online/"+currentUser).onDisconnect().remove();
}
</script>

</body>
</html>
